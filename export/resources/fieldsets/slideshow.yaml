title: Slideshow
fields:
  -
    handle: slides
    field:
      type: replicator
      display: Slides
      button_label: 'Slide hinzufügen'
      collapse: accordion
      sets:
        neue_setgruppe:
          display: 'Neue Setgruppe'
          sets:
            slide:
              display: Slide
              icon: insert-image
              fields:
                -
                  handle: image
                  field:
                    container: assets
                    max_files: 1
                    type: assets
                    display: Bild
                -
                  handle: topline
                  field:
                    type: text
                    display: Topline
                -
                  handle: headline
                  field:
                    type: textarea
                    display: Headline
                -
                  handle: subline
                  field:
                    type: textarea
                    display: Subline
                -
                  handle: link
                  field:
                    collections:
                      - pages
                    type: link
                    display: Link
                    width: 50
                -
                  handle: link_text
                  field:
                    type: text
                    display: Link-Text
                    width: 50
                -
                  import: layer
