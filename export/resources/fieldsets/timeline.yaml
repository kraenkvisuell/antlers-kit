title: Timeline
fields:
  -
    handle: timeline
    field:
      fullscreen: false
      type: replicator
      display: Timeline
      collapse: accordion
      sets:
        neue_setgruppe:
          display: 'Neue Setgruppe'
          sets:
            image:
              display: Bild
              icon: insert-image
              fields:
                -
                  handle: image
                  field:
                    container: assets
                    max_files: 1
                    type: assets
                    display: Bild
                -
                  import: has_light_bg
            text:
              display: Text
              icon: fieldtype-textarea
              fields:
                -
                  import: bard_with_sets
                -
                  import: has_light_bg
