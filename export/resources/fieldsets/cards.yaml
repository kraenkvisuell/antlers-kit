title: Kästen
fields:
  -
    handle: cards
    field:
      collapse: accordion
      button_label: 'Kasten hinzufügen'
      type: replicator
      display: Kästen
      sets:
        neue_setgruppe:
          display: 'Neue Setgruppe'
          sets:
            card:
              display: Kasten
              icon: add-circle
              fields:
                -
                  handle: image
                  field:
                    container: assets
                    max_files: 1
                    type: assets
                    display: Bild
                -
                  handle: image_ratio
                  field: ratio.ratio
                  config:
                    display: Bild-Seitenverhältnis
                    width: 50
                -
                  handle: image_fill
                  field: image_fill.image_fill
                  config:
                    width: 50
                -
                  handle: headline
                  field:
                    type: textarea
                    display: Headline
                -
                  import: simple_bard
                -
                  handle: link
                  field:
                    collections:
                      - pages
                    type: link
                    display: Link
                -
                  handle: link_text
                  field:
                    type: text
                    display: Link-Text
  -
    handle: max_cols
    field:
      options:
        -
          key: 2
          value: '2'
        -
          key: 3
          value: '3'
      inline: true
      default: '2'
      type: radio
      display: 'Max. Spalten'
      instructions: 'Auf breiten Bildschirmen'
