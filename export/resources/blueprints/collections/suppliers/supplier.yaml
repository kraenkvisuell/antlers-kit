title: Bezugsquelle
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: supplier_categories
            field:
              type: terms
              taxonomies:
                - supplier_categories
              display: Bezugsquellen-Kategorien
              mode: select
              validate:
                - required
          -
            handle: street
            field:
              type: text
              display: Straße
              validate:
                - required
          -
            handle: postcode
            field:
              type: text
              display: PLZ
              width: 25
              validate:
                - required
          -
            handle: city
            field:
              type: text
              display: Ort
              width: 75
              validate:
                - required
          -
            handle: phone
            field:
              type: text
              display: Telefon
              width: 50
          -
            handle: email
            field:
              type: text
              display: E-Mail
              width: 50
          -
            handle: website
            field:
              type: text
              display: Website
          -
            handle: latitude
            field:
              type: text
              display: Latitude
              width: 50
          -
            handle: longitude
            field:
              type: text
              display: Longitude
              width: 50
          -
            handle: lat_lng
            field:
              type: text
              display: Koordinaten
              visibility: read_only
              instructions: 'Werden automatisch gesetzt.'
  Favicons:
    display: Favicons
    sections:
      -
        fields:
          -
            handle: favicons
            field:
              type: favicons
              listable: false
              display: Favicons
  sidebar:
    display: Sidebar
    sections:
      - {  }
