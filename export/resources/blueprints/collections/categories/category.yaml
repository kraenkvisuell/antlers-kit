title: Kategorie
tabs:
  main:
    display: Hauptbereich
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            import: hero
          -
            handle: overview_image
            field:
              container: assets
              max_files: 1
              type: assets
              display: Überblick-Bild
          -
            handle: overview_text
            field: simple_bard.text
            config:
              display: Überblick-Text
          -
            handle: quote
            field:
              type: group
              display: Zitat
              fields:
                -
                  import: quote
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
  Favicons:
    display: Favicons
    sections:
      -
        fields:
          -
            handle: favicons
            field:
              type: favicons
              listable: false
              display: Favicons
  'SEO Meta':
    display: 'SEO Meta'
    sections:
      -
        fields:
          -
            handle: seo
            field:
              type: seo_pro
              listable: false
              display: SEO
  'SEO Previews':
    display: 'SEO Previews'
    sections:
      -
        fields:
          -
            handle: seo_previews
            field:
              type: seo_pro_previews
              listable: false
              display: 'SEO Previews'
              localizable: true
              hide_display: true
              unless:
                seo.enabled: 'equals false'
