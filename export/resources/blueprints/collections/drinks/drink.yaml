title: Getränk
tabs:
  main:
    display: Hauptbereich
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: images
            field:
              container: assets
              type: assets
              display: Bilder
          -
            import: simple_bard
          -
            handle: alcohol
            field:
              type: text
              display: Alkoholgehalt
              width: 33
          -
            handle: extract
            field:
              type: text
              display: Stammwürze
              width: 33
          -
            handle: bitter
            field:
              type: text
              display: Bittereinheiten
              width: 33
          -
            handle: color
            field:
              type: text
              display: Farbe
              width: 33
          -
            handle: energy
            field:
              type: text
              display: Energie
              width: 33
          -
            handle: bundle
            field:
              type: text
              display: Gebinde
              width: 33
          -
            handle: ingredients
            field:
              type: textarea
              display: Zutaten
          -
            handle: category
            field:
              collections:
                - categories
              mode: select
              max_items: 1
              type: entries
              display: Kategorie
              validate:
                - required
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
  Favicons:
    display: Favicons
    sections:
      -
        fields:
          -
            handle: favicons
            field:
              type: favicons
              listable: false
              display: Favicons
  'SEO Meta':
    display: 'SEO Meta'
    sections:
      -
        fields:
          -
            handle: seo
            field:
              type: seo_pro
              listable: false
              display: SEO
  'SEO Previews':
    display: 'SEO Previews'
    sections:
      -
        fields:
          -
            handle: seo_previews
            field:
              type: seo_pro_previews
              listable: false
              display: 'SEO Previews'
              localizable: true
              hide_display: true
              unless:
                seo.enabled: 'equals false'
