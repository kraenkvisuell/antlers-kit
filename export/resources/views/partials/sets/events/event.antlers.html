<div class="text-lg border-b border-base-800 pb-5">
    <div class="flex flex-col gap-3">
        <h3 class="font-semibold leading-[1.4em]">
            {{ event.title }}
        </h3>

        <div>
            {{ event.dates.start iso_format="DD.MM.YYYY" }}
            {{ if event.dates.end > event.dates.start }}
                –
                {{ event.dates.end iso_format="DD.MM.YYYY" }}
            {{ /if }}
        </div>
        {{ if event.link.url }}
            <div>
                <a
                    href="{{ event.link }}"
                    target="_blank"
                >
                    Mehr Informationen
                    <i class="fa-sharp fa-solid fa-angles-right text-sm"></i>
                </a>
            </div>
        {{ /if }}
    </div>
</div>
