{{ partial:section width="wide" }}
    <div class="py-15">
        <div class="grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-8 gap-y-16">
            {{ set.download_areas scope="area" }}
                <div class="flex flex-col gap-6">
                    <h2 class="font-headline text-xl">{{ area.title }}</h2>

                    <div class="flex flex-col gap-2">
                        {{ area.downloads scope="download" }}
                            {{ if download.file }}
                                {{ partial:sets.downloads.download }}
                            {{ /if }}
                        {{ /area.downloads }}
                    </div>
                </div>
            {{ /set.download_areas }}
        </div>
    </div>
{{ /partial:section }}
