<div
    class="
        z-10 
        {{ if set.layer === 'dark' }}
            bg-base-800
        {{ else }}
            bg-base-200
        {{ /if }}
    "
    x-intersect:leave="removeVisibleFixedBgId('{{ set.quote | slugify }}')"
    x-intersect:enter="addVisibleFixedBgId('{{ set.quote | slugify }}')"
>
    {{ partial:section width="wide" }}
        <div class="
            py-25 flex flex-col items-center gap-15
        ">
            <div>
                <img
                    src="/img/{{ set.icon === 'hops' ? 'hops' : 'quote' }}.svg"
                    alt="{{ set.icon === 'hops' ? 'Hopfen' : 'Anführungszeichen' }}-Zeichen"
                    class="w-15"
                />
            </div>

            <div class="
                text-center max-w-80 flex flex-col gap-7 items-center
                {{ if set.layer === 'dark' }}
                    text-white
                {{ /if }}
            ">
                <div class="text-xl leading-[1.5em] tracking-wide font-extrabold">
                    &bdquo;{{ set.quote | nl2br }}&ldquo;
                </div>

                <div class="w-full border-t border-base-500 font-headline text-lg pt-7">
                    {{ set.author }}
                </div>
            </div>
        </div>
    {{ /partial:section }}
</div>

<div
    class="fixed z-0 top-0 left-0 w-full h-screen transition-opacity duration-700 pointer-events-none"
    x-bind:class="{
        'opacity-0': visibleFixedBgIds.indexOf('{{ set.quote | slugify }}') == -1,
        'opacity-100': visibleFixedBgIds.indexOf('{{ set.quote | slugify }}') > -1,
    }"
>
    <img
        src="{{ set.bg_image }}"
        alt="{{ set.bg_image.alt }}"
        class="absolute w-full h-full object-cover"
    />
    {{ if set.layer === 'dark' }}
        <div class="absolute inset-0 bg-base-900/65 mix-blend-multiply">
        </div>
    {{ else }}
        <div class="absolute inset-0 bg-radial from-base-100/80 to-base-400/60">
        </div>
    {{ /if }}
</div>
